# ============================================================
# 研究系统 · 海外小机部署（Postgres + Go API）
# 用法：
#   cp .env.example .env   # 填写密钥与域名
#   docker compose up -d
#
# 使用固定子网 IP，避免部分 VPS 上 Docker 内嵌 DNS / 127.0.0.53 异常
# 导致 api 无法解析服务名 postgres。
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: research-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-research}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-research}
      TZ: UTC
    volumes:
      - research-pg-data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_connections=50
      - -c
      - shared_buffers=128MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-research} -d ${DB_NAME:-research}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      research:
        ipv4_address: 172.30.0.2

  api:
    image: ${RESEARCH_IMAGE:-ghcr.io/siblingsl/xy-tool-research-api:latest}
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: research-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 固定 IP，不依赖 Docker 服务名 DNS
      DB_HOST: 172.30.0.2
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-research}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-research}
      DB_SSLMODE: disable
      PORT: "8080"
    ports:
      - "${API_HOST_PORT:-46189}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      research:
        ipv4_address: 172.30.0.3

networks:
  research:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  research-pg-data:
