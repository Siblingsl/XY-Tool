# ============================================================
# 闲鱼自动发货工具 - 生产环境容器编排
#
# 与开发版 docker-compose.yml 的区别：
# - server 用 GHCR 预构建镜像（前端部署在 Cloudflare Pages，不在此运行 web）
# - server 启动时自动跑 migration（DB_MIGRATIONS_RUN=true）
# - 生产关闭自动建表（DB_SYNC=false）
# - 通过 env_file: .env.prod 加载生产环境变量
#
# 用法：
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d --remove-orphans
#
# 镜像地址由 .env.prod 的 IMAGE_OWNER / IMAGE_REPO 决定。
# 宿主机端口由 SERVER_HOST_PORT 决定（容器内仍为 3000）。
# ============================================================

services:
  # ---------- 数据库 ----------
  postgres:
    image: postgres:16-alpine
    container_name: xianyu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-xianyu_autodeliver}
      POSTGRES_USER: ${DB_USERNAME:-xianyu}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-xianyu} -d ${DB_DATABASE:-xianyu_autodeliver}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 生产不暴露 DB 端口到公网（如需本地调试可取消注释）
    # ports:
    #   - "5433:5432"

  # ---------- 缓存 / 队列 ----------
  redis:
    image: redis:7-alpine
    container_name: xianyu-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: ${REDIS_PASSWORD:+redis-server --requirepass $REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 生产不暴露 Redis 端口到公网
    # ports:
    #   - "6379:6379"

  # ---------- 后端 API ----------
  # 用 GHCR 预构建镜像，不 build，不挂源码
  # 启动时自动跑 migration（DB_MIGRATIONS_RUN=true），生产关闭自动建表
  server:
    image: ghcr.io/${IMAGE_OWNER}/${IMAGE_REPO}-server:latest
    container_name: xianyu-server
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      DB_SYNC: "false"
      DB_MIGRATIONS_RUN: "true"
      NODE_ENV: production
    ports:
      - "${SERVER_HOST_PORT:-14277}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------- Cloudflare Tunnel（国内服务器免备案，出站连 CF）----------
  # 配置 CLOUDFLARE_TUNNEL_TOKEN 后启动：
  #   docker compose --env-file .env.prod -f docker-compose.prod.yml --profile tunnel up -d
  cloudflared:
    profiles: ["tunnel"]
    image: cloudflare/cloudflared:latest
    container_name: xianyu-cloudflared
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.prod
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

  # ---------- API 反代（免费 CF 橙云回源 80 → 本机 14277，无需 Enterprise）----------
  nginx-api:
    image: nginx:alpine
    container_name: xianyu-nginx-api
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server

volumes:
  postgres-data:
  redis-data:
