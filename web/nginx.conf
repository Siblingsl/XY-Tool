# 生产环境 nginx 配置。
# - 托管 vite 构建的静态文件
# - SPA history 路由 fallback（刷新非根路径不 404）
# - /api 反代到后端 server（默认 server:3000，可用环境变量覆盖）
# - /api/docs 同样反代（Swagger UI）

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # 静态资源缓存（hash 文件名，可长期缓存）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API 反代到后端（容器名 server，端口 3000）
    # 部署时若后端地址不同，改写此处或用 envsubst 模板
    location /api/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 支持（实时推送）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # SPA history 路由 fallback：所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
