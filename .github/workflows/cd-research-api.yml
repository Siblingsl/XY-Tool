# ============================================================
# CD · Research API（海外 Go 后端）
# 触发：push main/master 且改动 research/server 或 research/deploy。
# 流程：构建镜像 → GHCR → SSH 到海外机 compose pull/up。
#
# Secrets：RESEARCH_SSH_HOST / RESEARCH_SSH_USER / RESEARCH_SSH_KEY / RESEARCH_SSH_PORT
# Variables：
#   ENABLE_RESEARCH_DEPLOY=true
#   RESEARCH_DEPLOY_DIR=/opt/research-api
# ============================================================

name: CD · Research API

on:
  push:
    branches: [main, master]
    paths:
      - 'research/server/**'
      - 'research/deploy/**'
      - '.github/workflows/cd-research-api.yml'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: '跳过部署，仅构建推送镜像'
        required: false
        type: boolean
        default: false

concurrency:
  group: cd-research-api-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & Push Research API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Meta
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE="${{ env.REGISTRY }}/${OWNER}/${REPO}-research-api"
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./research/server
          file: ./research/server/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Research API
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !(github.event.inputs.skip_deploy == 'true') && vars.ENABLE_RESEARCH_DEPLOY == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Sync deploy files
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.RESEARCH_SSH_HOST }}
          username: ${{ secrets.RESEARCH_SSH_USER }}
          key: ${{ secrets.RESEARCH_SSH_KEY }}
          port: ${{ secrets.RESEARCH_SSH_PORT || 22 }}
          source: "research/deploy/docker-compose.yml,research/deploy/deploy.sh"
          target: ${{ vars.RESEARCH_DEPLOY_DIR || '/opt/research-api' }}
          strip_components: 2
          overwrite: true

      - name: Compose up via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.RESEARCH_SSH_HOST }}
          username: ${{ secrets.RESEARCH_SSH_USER }}
          key: ${{ secrets.RESEARCH_SSH_KEY }}
          port: ${{ secrets.RESEARCH_SSH_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            DIR="${{ vars.RESEARCH_DEPLOY_DIR || '/opt/research-api' }}"
            cd "$DIR"
            if [ ! -f .env ]; then
              echo "::error::缺少 $DIR/.env，请先根据 research/deploy/.env.example 创建"
              exit 1
            fi
            # 写入本次镜像（覆盖 RESEARCH_IMAGE）
            IMAGE="${{ needs.build.outputs.image }}:latest"
            if grep -q '^RESEARCH_IMAGE=' .env; then
              sed -i "s|^RESEARCH_IMAGE=.*|RESEARCH_IMAGE=${IMAGE}|" .env
            else
              echo "RESEARCH_IMAGE=${IMAGE}" >> .env
            fi
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin || true
            chmod +x deploy.sh
            # 海外一般可直接 pull GHCR
            docker compose --env-file .env pull api
            docker compose --env-file .env up -d --remove-orphans
            sleep 3
            curl -sf "http://127.0.0.1:${API_HOST_PORT:-8080}/api/research/health" || \
              curl -sf "http://127.0.0.1:8080/api/research/health"
            echo "deployed ${IMAGE}"
