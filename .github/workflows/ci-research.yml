# CI · Research（邮件分析前端）：push main/master 或 PR 且改动 web-research/** 时，执行 install → build。
name: CI · Research

on:
  push:
    branches: [main, master]
    paths:
      - 'web-research/**'
      - '.github/workflows/ci-research.yml'
  pull_request:
    paths:
      - 'web-research/**'

concurrency:
  group: ci-research-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    name: Research (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-research

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web-research/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check + build
        run: npm run build
