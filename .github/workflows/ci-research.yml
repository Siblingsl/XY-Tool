# CI · Research（邮件分析前端）：push/PR 改动 research/web/** 时 install → build。
# retrigger: 2026-07-23
name: CI · Research

on:
  push:
    branches: [main, master]
    paths:
      - 'research/web/**'
      - '.github/workflows/ci-research.yml'
  pull_request:
    paths:
      - 'research/web/**'

concurrency:
  group: ci-research-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    name: Research (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./research/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: research/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check + build
        run: npm run build
