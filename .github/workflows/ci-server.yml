# CI · Server：push main/master 或 PR 且改动 xianyu/server/** 时，执行 install → build → test。
name: CI · Server

on:
  push:
    branches: [main, master]
    paths:
      - 'xianyu/server/**'
      - '.github/workflows/ci-server.yml'
  pull_request:
    paths:
      - 'xianyu/server/**'

concurrency:
  group: ci-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./xianyu/server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: xianyu/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
