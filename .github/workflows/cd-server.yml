# ============================================================
# CD · Server（闲鱼后端 · 国内机）
# 触发：push main/master 且改动了 xianyu/server 相关文件，或打 v* tag。
# 流程：构建镜像 → GHCR → Runner 打包 SCP → 服务器 docker load。
#
# GitHub Secrets：SSH_HOST / SSH_USER / SSH_KEY / SSH_PORT
# GitHub Variables：ENABLE_DEPLOY=true · DEPLOY_DIR=/opt/xianyu-tool
# ============================================================

name: CD · Server

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'xianyu/server/**'
      - 'docker-compose.prod.yml'
      - 'infra/scripts/deploy.sh'
      - 'infra/nginx/**'
      - '.github/workflows/cd-server.yml'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: '跳过部署，仅构建推送镜像'
        required: false
        type: boolean
        default: false

concurrency:
  group: cd-server-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-server:
    name: Build & Push Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
      repo: ${{ steps.meta.outputs.repo }}
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image names & tags
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./xianyu/server
          file: ./xianyu/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-server:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-server:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-backend:
    name: Deploy Backend to Server
    runs-on: ubuntu-latest
    needs: build-server
    if: ${{ !(github.event.inputs.skip_deploy == 'true') && vars.ENABLE_DEPLOY == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & pack image on runner
        env:
          OWNER: ${{ needs.build-server.outputs.owner }}
          REPO: ${{ needs.build-server.outputs.repo }}
          SHORT_SHA: ${{ needs.build-server.outputs.short_sha }}
        run: |
          IMAGE_SHA="${{ env.REGISTRY }}/${OWNER}/${REPO}-server:${SHORT_SHA}"
          IMAGE_LATEST="${{ env.REGISTRY }}/${OWNER}/${REPO}-server:latest"
          docker pull "$IMAGE_SHA"
          docker tag "$IMAGE_SHA" "$IMAGE_LATEST"
          docker save "$IMAGE_SHA" "$IMAGE_LATEST" | gzip -1 > server-image.tar.gz
          # 打成服务器期望的扁平布局（scripts/、nginx/）
          mkdir -p deploy-bundle/scripts deploy-bundle/nginx
          mv server-image.tar.gz deploy-bundle/
          cp docker-compose.prod.yml deploy-bundle/
          cp infra/scripts/deploy.sh deploy-bundle/scripts/
          cp infra/nginx/api.conf deploy-bundle/nginx/
          ls -lh deploy-bundle/server-image.tar.gz

      - name: Sync image + deploy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy-bundle/*"
          target: ${{ vars.DEPLOY_DIR || '/opt/xianyu-tool' }}
          strip_components: 1
          overwrite: true
          timeout: 120s

      - name: Load image & deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd ${{ vars.DEPLOY_DIR || '/opt/xianyu-tool' }}
            gunzip -c server-image.tar.gz | docker load
            rm -f server-image.tar.gz
            chmod +x scripts/deploy.sh
            bash scripts/deploy.sh deploy --skip-pull
