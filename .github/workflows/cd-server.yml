# ============================================================
# CD · Server（后端）
# 触发：push main/master 且改动了 server 相关文件，或打 v* tag。
# 流程：构建 server 镜像 → GHCR → SSH 部署到自有服务器。
#
# GitHub Secrets：SSH_HOST / SSH_USER / SSH_KEY / SSH_PORT
# GitHub Variables：
#   ENABLE_DEPLOY=true            开启后端 SSH 部署
#   DEPLOY_DIR=/opt/xianyu-tool   （可选）
# ============================================================

name: CD · Server

on:
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - 'server/**'
      - 'docker-compose.prod.yml'
      - 'scripts/deploy.sh'
      - 'nginx/**'
      - '.github/workflows/cd-server.yml'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: '跳过部署，仅构建推送镜像'
        required: false
        type: boolean
        default: false

concurrency:
  group: cd-server-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ---------- 后端：构建并推送 server 镜像 ----------
  build-server:
    name: Build & Push Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image names & tags
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-server:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-server:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- 后端：SSH 部署到服务器 ----------
  deploy-backend:
    name: Deploy Backend to Server
    runs-on: ubuntu-latest
    needs: build-server
    if: ${{ !(github.event.inputs.skip_deploy == 'true') && vars.ENABLE_DEPLOY == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Sync deploy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.prod.yml,scripts/deploy.sh,nginx/api.conf"
          target: ${{ vars.DEPLOY_DIR || '/opt/xianyu-tool' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          # 默认约 10m；国内机拉 GHCR 镜像常超过该时间
          command_timeout: 60m
          script: |
            cd ${{ vars.DEPLOY_DIR || '/opt/xianyu-tool' }}
            chmod +x scripts/deploy.sh
            bash scripts/deploy.sh deploy
