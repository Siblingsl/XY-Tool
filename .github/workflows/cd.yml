# ============================================================
# CD 流水线：push main 或手动触发时
#   1. 构建 server + web Docker 镜像（multi-stage Dockerfile）
#   2. 推送到 GitHub Container Registry (ghcr.io)
#   3. SSH 登服务器 pull + up + 健康检查
#
# 前置配置（GitHub Settings → Secrets and variables → Actions）：
#   SSH_HOST   服务器 IP/域名
#   SSH_USER   SSH 用户名（如 root）
#   SSH_KEY    SSH 私钥（完整内容）
#   SSH_PORT   SSH 端口（可选，默认 22）
#   DEPLOY_DIR 服务器部署目录（可选，默认 /opt/xianyu-tool）
#
# GHCR 登录用内置 GITHUB_TOKEN（permissions: packages: write），无需额外 secret。
# ============================================================

name: CD

on:
  push:
    branches: [main, master]
    # 也可在打 tag 时触发发布
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: '跳过部署，仅构建推送镜像'
        required: false
        type: boolean
        default: false

# 同一分支并发时取消旧的，避免重复部署
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    # CI 通过后才构建（可选：加 needs，但这里假设 CI 独立 workflow 已并行跑）
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image names & tags
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "::notice::镜像将推送为 $REGISTRY/$OWNER/$REPO-server:$SHORT_SHA 和 -web"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ============ 构建推送 server ============
      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          # 双 tag：latest（滚动部署用）+ sha（版本追溯/回滚）
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-server:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-server:${{ steps.meta.outputs.short_sha }}
          # GHA 缓存加速
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ============ 构建推送 web ============
      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-web:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-web:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 导出镜像信息供下游 deploy job 使用
      - name: Output image info
        run: |
          echo "SERVER_IMAGE=${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-server:${{ steps.meta.outputs.short_sha }}" >> $GITHUB_ENV
          echo "WEB_IMAGE=${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-web:${{ steps.meta.outputs.short_sha }}" >> $GITHUB_ENV

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    # 手动触发时可跳过部署；或未配置 SSH secrets 时跳过
    if: ${{ !(github.event.inputs.skip_deploy == 'true') && vars.ENABLE_DEPLOY == 'true' }}

    steps:
      - uses: actions/checkout@v4

      # 每次部署前同步 compose / deploy 脚本（服务器上的文件不会随 push 自动更新）
      - name: Sync deploy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.prod.yml,scripts/deploy.sh"
          target: ${{ vars.DEPLOY_DIR || '/opt/xianyu-tool' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ vars.DEPLOY_DIR || '/opt/xianyu-tool' }}
            chmod +x scripts/deploy.sh
            bash scripts/deploy.sh deploy

      - name: Summary
        run: |
          echo "::notice::部署完成！镜像版本：$(echo '${{ needs.build-and-push.outputs.short_sha || github.sha }}' | cut -c1-7)"
          echo "如部署失败，可在服务器运行：bash scripts/deploy.sh rollback <sha>"
