# ============================================================
# CD 流水线：push main 时
#   后端：构建 server 镜像 → GHCR → SSH 部署到自有服务器
#   前端：构建 Vite → Cloudflare Pages（/api 由 Functions 反代到后端）
#
# GitHub Secrets：
#   SSH_HOST / SSH_USER / SSH_KEY / SSH_PORT（后端 SSH）
#   CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID（前端 CF Pages）
#
# GitHub Variables：
#   ENABLE_DEPLOY=true          开启后端 SSH 部署
#   ENABLE_CF_DEPLOY=true       开启前端 CF Pages 部署
#   DEPLOY_DIR=/opt/xianyu-tool  （可选）
#   BACKEND_URL=http://IP:14277  后端 API 地址（CF Functions 反代用）
#   CLOUDFLARE_PAGES_PROJECT_NAME=xy-tool-web
# ============================================================

name: CD

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: '跳过部署，仅构建推送镜像'
        required: false
        type: boolean
        default: false

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ---------- 后端：构建并推送 server 镜像 ----------
  build-server:
    name: Build & Push Server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image names & tags
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-server:latest
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.repo }}-server:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- 后端：SSH 部署到服务器 ----------
  deploy-backend:
    name: Deploy Backend to Server
    runs-on: ubuntu-latest
    needs: build-server
    if: ${{ !(github.event.inputs.skip_deploy == 'true') && vars.ENABLE_DEPLOY == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Sync deploy files to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "docker-compose.prod.yml,scripts/deploy.sh"
          target: ${{ vars.DEPLOY_DIR || '/opt/xianyu-tool' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ vars.DEPLOY_DIR || '/opt/xianyu-tool' }}
            chmod +x scripts/deploy.sh
            bash scripts/deploy.sh deploy

  # ---------- 前端：部署到 Cloudflare Pages ----------
  deploy-frontend:
    name: Deploy Frontend to Cloudflare
    runs-on: ubuntu-latest
    if: ${{ !(github.event.inputs.skip_deploy == 'true') && vars.ENABLE_CF_DEPLOY == 'true' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::未配置 CLOUDFLARE_API_TOKEN。请到 GitHub → Settings → Secrets → Actions → Repository secrets 添加"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::未配置 CLOUDFLARE_ACCOUNT_ID。请到 GitHub → Settings → Secrets → Actions → Repository secrets 添加"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Inject wrangler config
        working-directory: web
        env:
          BACKEND: ${{ vars.BACKEND_URL }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$BACKEND" ]; then
            echo "::error::请在 GitHub Variables 中设置 BACKEND_URL（如 http://120.27.20.115:14277）"
            exit 1
          fi
          sed -i "s|^BACKEND_URL = .*|BACKEND_URL = \"${BACKEND}\"|" wrangler.toml
          # account_id 写入 wrangler.toml，避免 wrangler-action 截断 Account ID
          if grep -q '^account_id' wrangler.toml; then
            sed -i "s|^account_id = .*|account_id = \"${ACCOUNT_ID}\"|" wrangler.toml
          else
            echo "account_id = \"${ACCOUNT_ID}\"" >> wrangler.toml
          fi

      - name: Build web
        working-directory: web
        run: npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT="${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}"
          PROJECT="${PROJECT:-xy-tool-web}"
          npx wrangler@3 pages deploy dist \
            --project-name="$PROJECT" \
            --commit-dirty=true

      - name: Summary
        run: |
          echo "::notice::前端已部署到 Cloudflare Pages 项目：${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'xy-tool-web' }}"
          echo "请在服务器 .env.prod 将 CORS_ORIGIN 设为 CF 域名（如 https://xxx.pages.dev）"
