# CI · Web（闲鱼前端）：push main/master 或 PR 且改动 xianyu/web/** 时，执行 install → build。
# retrigger: 2026-07-23
name: CI · Web

on:
  push:
    branches: [main, master]
    paths:
      - 'xianyu/web/**'
      - '.github/workflows/ci-web.yml'
  pull_request:
    paths:
      - 'xianyu/web/**'

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./xianyu/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: xianyu/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check + build
        run: npm run build
