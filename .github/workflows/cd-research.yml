# ============================================================
# CD · Research Web（邮件分析前端 → Cloudflare Pages）
# 触发：push main/master 且改动了 research/web/** 。
# API 指向海外 Go 后端：RESEARCH_API_BASE_URL（或 VITE_RESEARCH_API_BASE_URL）
#
# GitHub Secrets：CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID
# GitHub Variables：
#   ENABLE_CF_DEPLOY=true
#   RESEARCH_API_BASE_URL=https://research-api.example.com/api
#   XY_WEB_URL=https://xy.skyed.dpdns.org          # 顶栏跳转闲鱼前端
#   RESEARCH_WEB_URL=https://emailanalysis.skyed.dpdns.org  # 闲鱼 CD 用
# ============================================================

name: CD · Research

on:
  push:
    branches: [main, master]
    paths:
      - 'research/web/**'
      - '.github/workflows/cd-research.yml'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: '跳过部署'
        required: false
        type: boolean
        default: false

concurrency:
  group: cd-research-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-research:
    name: Deploy Research Frontend to Cloudflare
    runs-on: ubuntu-latest
    if: ${{ !(github.event.inputs.skip_deploy == 'true') && vars.ENABLE_CF_DEPLOY == 'true' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::未配置 CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::未配置 CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: research/web/package-lock.json

      - name: Build research web
        working-directory: research/web
        env:
          VITE_API_BASE_URL: ${{ vars.RESEARCH_API_BASE_URL || vars.VITE_API_BASE_URL }}
          # 顶栏「闲鱼自动发货系统」跳转目标（本地默认见 .env.example）
          VITE_SISTER_APP_URL: ${{ vars.XY_WEB_URL }}
        run: |
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-https://research-api.skyed.dpdns.org/api}"
          export VITE_SISTER_APP_URL="${VITE_SISTER_APP_URL:-https://xy.skyed.dpdns.org}"
          echo "VITE_API_BASE_URL=$VITE_API_BASE_URL"
          echo "VITE_SISTER_APP_URL=$VITE_SISTER_APP_URL"
          npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: research/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT="email-analysis"
          npx wrangler@3 pages project create "$PROJECT" --production-branch=main 2>/dev/null || true
          npx wrangler@3 pages deploy dist \
            --project-name="$PROJECT" \
            --commit-dirty=true

      - name: Summary
        run: |
          echo "::notice::邮件分析前端已部署：email-analysis"
          echo "请配置 RESEARCH_API_BASE_URL 指向海外 Go API"
