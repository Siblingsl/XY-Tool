# ============================================================
# CD · Web（闲鱼前端）
# 触发：push main/master 且改动了 xianyu/web/** 。
#
# GitHub Variables（可选）：
#   RESEARCH_WEB_URL=https://emailanalysis.skyed.dpdns.org  # 顶栏跳转研究前端
# ============================================================

name: CD · Web

on:
  push:
    branches: [main, master]
    paths:
      - 'xianyu/web/**'
      - '.github/workflows/cd-web.yml'
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: '跳过部署'
        required: false
        type: boolean
        default: false

concurrency:
  group: cd-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Web Frontend to Cloudflare
    runs-on: ubuntu-latest
    if: ${{ !(github.event.inputs.skip_deploy == 'true') && vars.ENABLE_CF_DEPLOY == 'true' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::未配置 CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::未配置 CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: xianyu/web/package-lock.json

      - name: Inject wrangler config
        if: ${{ vars.BACKEND_URL != '' }}
        working-directory: xianyu/web
        env:
          BACKEND: ${{ vars.BACKEND_URL }}
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          sed -i "s|^BACKEND_URL = .*|BACKEND_URL = \"${BACKEND}\"|" wrangler.toml
          if grep -q '^account_id' wrangler.toml; then
            sed -i "s|^account_id = .*|account_id = \"${ACCOUNT_ID}\"|" wrangler.toml
          else
            echo "account_id = \"${ACCOUNT_ID}\"" >> wrangler.toml
          fi

      - name: Build web
        working-directory: xianyu/web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # 顶栏「项目研究系统」跳转目标（本地默认见 .env.example）
          VITE_SISTER_APP_URL: ${{ vars.RESEARCH_WEB_URL }}
        run: |
          export VITE_SISTER_APP_URL="${VITE_SISTER_APP_URL:-https://emailanalysis.skyed.dpdns.org}"
          echo "VITE_SISTER_APP_URL=$VITE_SISTER_APP_URL"
          npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: xianyu/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT="${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}"
          PROJECT="${PROJECT:-xy-tool-web}"
          npx wrangler@3 pages project create "$PROJECT" --production-branch=main 2>/dev/null || true
          npx wrangler@3 pages deploy dist \
            --project-name="$PROJECT" \
            --commit-dirty=true

      - name: Summary
        run: |
          echo "::notice::闲鱼前端已部署：${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'xy-tool-web' }}"
